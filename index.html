<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <header>
      <h1>My Tasks</h1>
      <p class="subtitle">Stay on top of what matters</p>
    </header>

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task…" maxlength="120" />
      <button id="addBtn" onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>

    <p id="emptyMsg" class="empty-msg">No tasks yet. Add one above!</p>
  </main>

  <script src="app.js"></script>
</body>
</html>
